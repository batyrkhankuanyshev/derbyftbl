<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="DerbyFTBL — футбольные форма и экипировка в Атырау. Заказ через WhatsApp."/>
<title>DerbyFTBL — Футбольный магазин, Атырау</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Inter,sans-serif' font-size='9' font-weight='700' fill='white'>FTBL</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --black: #1a1a1a;
  --gray1: #444;
  --gray2: #777;
  --gray3: #aaa;
  --gray4: #ddd;
  --gray5: #f5f5f5;
  --white: #fff;
  --green: #25D366;
  --font: 'Inter', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body { font-family: var(--font); color: var(--black); background: var(--white); }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--gray4);
  padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px;
}
.logo { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.04em; text-decoration: none; color: var(--black); }
.logo span { color: var(--gray2); font-weight: 400; }
.header-actions { display: flex; align-items: center; gap: 1rem; }
.btn-customize {
  font-size: 0.8rem; font-weight: 500; color: var(--black);
  border: 1px solid var(--gray4); border-radius: 4px;
  padding: 6px 14px; text-decoration: none;
  transition: border-color 0.15s, background 0.15s;
}
.btn-customize:hover { border-color: var(--black); background: var(--gray5); }
.btn-wa-header {
  font-size: 0.8rem; font-weight: 500; color: var(--white);
  background: var(--green); border: none; border-radius: 4px;
  padding: 6px 14px; text-decoration: none; display: flex; align-items: center; gap: 6px;
  transition: opacity 0.15s;
}
.btn-wa-header:hover { opacity: 0.88; }

/* ── HERO ── */
.hero {
  position: relative;
  overflow: hidden;
  background: #0a0a0a;
  border-bottom: 1px solid #222;
  padding: 6rem 2rem 5rem;
}
.hero-bg {
  position: absolute; inset: 0;
  background: url('hero-stadium.jpg') center center / cover no-repeat;
  opacity: 0.35;
  pointer-events: none;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.75) 40%, rgba(0,0,0,0.2));
  pointer-events: none;
}
.hero-inner { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; width: 100%; }
.hero-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 0.9rem; }
.hero h1 {
  font-size: 3.2rem; font-weight: 800; line-height: 1.05;
  margin-bottom: 0.9rem; color: #fff;
  letter-spacing: -0.01em;
  font-stretch: expanded;
  text-transform: uppercase;
}
.hero p { font-size: 0.95rem; color: rgba(255,255,255,0.6); max-width: 400px; line-height: 1.65; margin-bottom: 1.8rem; }
.btn-hero-wa {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--green); color: #fff;
  font-size: 0.88rem; font-weight: 600;
  padding: 12px 24px; border-radius: 6px; text-decoration: none;
  transition: opacity 0.15s;
}
.btn-hero-wa:hover { opacity: 0.88; }

/* ── FILTERS ── */
.filters {
  position: sticky; top: 56px; z-index: 90;
  background: var(--white); border-bottom: 1px solid var(--gray4);
  padding: 0 2rem;
  display: flex; gap: 0; overflow-x: auto;
}
.filter-btn {
  font-size: 0.8rem; font-weight: 500; color: var(--gray2);
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 0.85rem 1rem; cursor: pointer; white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  font-family: var(--font);
}
.filter-btn:hover { color: var(--black); }
.filter-btn.active { color: var(--black); border-bottom-color: var(--black); }

/* ── GRID ── */
.catalogue {
  max-width: 860px; margin: 0 auto;
  padding: 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.5rem;
}

/* ── JERSEY CARD ── */
.jersey-card {
  border: 1px solid var(--gray4);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
  display: flex; flex-direction: column;
}
.jersey-card:hover { border-color: var(--gray1); }
.jersey-card img {
  width: 100%; aspect-ratio: 3/4; object-fit: cover;
  background: var(--gray5); display: block;
}
.card-body { padding: 0.85rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
.card-category { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--gray2); }
.card-name { font-size: 0.88rem; font-weight: 500; color: var(--black); line-height: 1.35; flex: 1; }
.card-actions { display: flex; gap: 8px; margin-top: 0.4rem; }
.btn-order {
  flex: 1; font-size: 0.78rem; font-weight: 500; color: var(--white);
  background: var(--green); border: none; border-radius: 4px;
  padding: 7px 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: opacity 0.15s; text-decoration: none; font-family: var(--font);
}
.btn-order:hover { opacity: 0.88; }
.btn-edit {
  font-size: 0.78rem; font-weight: 500; color: var(--black);
  background: none; border: 1px solid var(--gray4); border-radius: 4px;
  padding: 7px 10px; cursor: pointer; white-space: nowrap;
  transition: border-color 0.15s; text-decoration: none; font-family: var(--font);
}
.btn-edit:hover { border-color: var(--black); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 4rem 2rem; color: var(--gray2); font-size: 0.9rem; grid-column: 1/-1; }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--gray4);
  padding: 1.5rem 2rem;
  text-align: center;
  font-size: 0.78rem; color: var(--gray3);
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 0 1rem; }
  .hero { padding: 2rem 1rem 1.5rem; }
  .hero h1 { font-size: 1.5rem; }
  .filters { padding: 0 1rem; }
  .catalogue { padding: 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><img src="logos/derby-ftbl.png" alt="DerbyFTBL" style="height:36px; width:auto; display:block;"/></a>
  <div class="header-actions">
    <a class="btn-customize" href="customizer.html">Конструктор формы</a>
    <a class="btn-wa-header" href="https://wa.me/77026526400" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.143.564 4.153 1.55 5.888L.058 23.625a.75.75 0 0 0 .906.919l5.9-1.548A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.7-.504-5.25-1.385l-.375-.217-3.875 1.016 1.032-3.767-.23-.386A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      WhatsApp
    </a>
  </div>
</header>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-inner">
    <p class="hero-label">Атырау, Казахстан</p>
    <h1>Футбольная форма<br>лучших клубов мира</h1>
    <p>Оригинальные реплики сезона 25/26. Заказ и доставка по Атырау через WhatsApp.</p>
    <a class="btn-hero-wa" href="https://wa.me/77026526400" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.143.564 4.153 1.55 5.888L.058 23.625a.75.75 0 0 0 .906.919l5.9-1.548A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.7-.504-5.25-1.385l-.375-.217-3.875 1.016 1.032-3.767-.23-.386A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
      Написать в WhatsApp
    </a>
  </div>
</div>

<nav class="filters" id="filters"></nav>

<div class="catalogue" id="catalogue"></div>

<footer>© 2025 DerbyFTBL · Атырау · <a href="https://wa.me/77026526400" style="color:inherit">+7 702 652 6400</a></footer>

<script>
const WA = '77026526400';

fetch('jerseys/manifest.json')
  .then(r => r.json())
  .then(data => {
    const categories = data.categories;
    const jerseys = data.jerseys;
    let active = 'все';

    const filtersEl = document.getElementById('filters');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === 'все' ? ' active' : '');
      btn.textContent = cat === 'все' ? 'Все' : cat;
      btn.onclick = () => {
        active = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      filtersEl.appendChild(btn);
    });

    function render() {
      const el = document.getElementById('catalogue');
      const list = active === 'все' ? jerseys : jerseys.filter(j => j.category === active);
      if (!list.length) { el.innerHTML = '<p class="empty">Нет товаров в этой категории</p>'; return; }
      el.innerHTML = list.map(j => {
        const msg = encodeURIComponent(`Здравствуйте! Хочу заказать: ${j.name}`);
        const waUrl = `https://wa.me/${WA}?text=${msg}`;
        const custUrl = `customizer.html?jersey=${encodeURIComponent(j.file)}`;
        return `
          <div class="jersey-card">
            <img src="jerseys/${j.file}" alt="${j.name}" loading="lazy"/>
            <div class="card-body">
              <span class="card-category">${j.category}</span>
              <span class="card-name">${j.name}</span>
              <div class="card-actions">
                <a class="btn-order" href="${waUrl}" target="_blank">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.143.564 4.153 1.55 5.888L.058 23.625a.75.75 0 0 0 .906.919l5.9-1.548A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.7-.504-5.25-1.385l-.375-.217-3.875 1.016 1.032-3.767-.23-.386A9.956 9.956 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                  Заказать
                </a>
                <a class="btn-edit" href="${custUrl}">✏︎</a>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    render();
  });
</script>
</body>
</html>
